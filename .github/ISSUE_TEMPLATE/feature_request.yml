name: Feature request
description: Suggest an improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: It is hard to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options you evaluated

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, constraints
