name: Bug report
description: Report a reproducible defect
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this bug. Please share enough detail so we can reproduce it quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: UI crashes when opening product detail
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, in order
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version
      placeholder: Chrome 123 / Windows 11 / Node 20
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional but strongly recommended
